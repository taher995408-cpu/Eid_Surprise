<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurpriseByTaher | Eid Surprise</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#006400,#00b894);
  overflow:hidden;
  color:white;
  text-align:center;
}

.gift-box{
  width:180px;
  height:180px;
  background:#00b894;
  position:relative;
  cursor:pointer;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,255,150,0.7);
  animation:bounce 1s infinite;
}

.gift-box:before{
  content:"";
  position:absolute;
  width:100%;
  height:35px;
  background:#ffd700;
  top:70px;
}

.gift-box:after{
  content:"";
  position:absolute;
  width:35px;
  height:100%;
  background:#ffd700;
  left:70px;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

#message{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
}

h1{
  font-size:28px;
  margin-bottom:20px;
  text-shadow:0 0 10px #00ffcc;
}

button{
  padding:12px 25px;
  margin:8px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.whatsapp{background:#25D366;color:white;}
.facebook{background:#1877F2;color:white;}

canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div class="gift-box" onclick="openGift()"></div>

<div id="message">
  <h1>🎉 সারপ্রাইজ! 🎉<br>তোমাকে ঈদের অগ্রিম শুভেচ্ছা 🌙✨</h1>
  <button class="whatsapp" onclick="shareWhatsApp()">WhatsApp শেয়ার</button>
  <button class="facebook" onclick="shareFacebook()">Facebook শেয়ার</button>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/explosion/explosion-01.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
var canvas=document.getElementById("canvas");
var ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

var particles=[];

function createFirework(x,y){
  for(let i=0;i<80;i++){
    particles.push({
      x:x,
      y:y,
      radius:2,
      color:"hsl("+Math.random()*360+",100%,50%)",
      speedX:(Math.random()-0.5)*8,
      speedY:(Math.random()-0.5)*8,
      life:100
    });
  }
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,index)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    p.x+=p.speedX;
    p.y+=p.speedY;
    p.life--;
    if(p.life<=0) particles.splice(index,1);
  });

  requestAnimationFrame(animate);
}
animate();

function openGift(){
  document.querySelector(".gift-box").style.display="none";
  document.getElementById("message").style.display="block";
  document.getElementById("sound").play();

  setInterval(function(){
    var x=Math.random()*canvas.width;
    var y=Math.random()*canvas.height/2;
    createFirework(x,y);
  },800);
}

function shareWhatsApp(){
  var url=window.location.href;
  window.open("https://wa.me/?text=দেখো এই ঈদ সারপ্রাইজ 👉 "+url);
}

function shareFacebook(){
  var url=window.location.href;
  window.open("https://www.facebook.com/sharer/sharer.php?u="+url);
}
</script>

</body>
</html>
